components:
  schemas:
    ScoringModelDTO:
      required:
      - modelApproach
      - modelName
      - modelStatus
      - modelVersion
      - scoreDimension
      type: object
      properties:
        scoringModelId:
          type: string
          format: uuid
          readOnly: true
        modelName:
          maxLength: 100
          minLength: 2
          type: string
        modelVersion:
          minLength: 1
          pattern: ^\d+\.\d+(\.\d+)?$
          type: string
        scoreDimension:
          type: string
          enum:
          - FINANCIAL
          - NON_FINANCIAL
          - COMBINED
          - BEHAVIORAL
        modelApproach:
          type: string
          enum:
          - AI
          - RULES_BASED
          - HYBRID
          - STATISTICAL
        modelStatus:
          type: string
          enum:
          - ACTIVE
          - DEPRECATED
          - TESTING
          - DISABLED
        note:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    ScoringCaseDTO:
      required:
      - caseStatus
      - caseType
      - customerId
      type: object
      properties:
        scoringCaseId:
          type: string
          format: uuid
          readOnly: true
        loanApplicationId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        caseStatus:
          type: string
          enum:
          - OPEN
          - COMPLETED
          - FAILED
          - CANCELLED
        caseType:
          type: string
          enum:
          - APPLICATION
          - RE_SCORING
          - PORTFOLIO_MONITOR
          - PRE_APPROVAL
        remarks:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    ScoringRequestDTO:
      required:
      - requestStatus
      - requestTimestamp
      - scoringCaseId
      - scoringModelId
      type: object
      properties:
        scoringRequestId:
          type: string
          format: uuid
          readOnly: true
        scoringCaseId:
          type: string
          format: uuid
        scoringModelId:
          type: string
          format: uuid
        requestTimestamp:
          type: string
          format: date-time
        requestStatus:
          type: string
          enum:
          - COMPLETED
          - FAILED
          - PENDING
          - IN_PROGRESS
          - TIMEOUT
        note:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    ScoringResultDTO:
      required:
      - scoreOutcome
      - scoreValue
      - scoringRequestId
      type: object
      properties:
        scoringResultId:
          type: string
          format: uuid
          readOnly: true
        scoringRequestId:
          type: string
          format: uuid
        scoreValue:
          maximum: 1.0
          exclusiveMaximum: false
          minimum: 0.0
          exclusiveMinimum: false
          type: number
        scoreOutcome:
          type: string
          enum:
          - APPROVE
          - REJECT
          - MANUAL_REVIEW
          - REFER_TO_SUPERVISOR
        reasonCodes:
          maxLength: 2000
          minLength: 0
          type: string
        extraDetails:
          maxLength: 5000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    ScoringBureauCallDTO:
      required:
      - bureauName
      - callDate
      - isSuccess
      - referenceCode
      - scoringCaseId
      type: object
      properties:
        scoringBureauCallId:
          type: string
          format: uuid
          readOnly: true
        scoringCaseId:
          type: string
          format: uuid
        bureauName:
          type: string
          enum:
          - AXESOR
          - EQUIFAX
          - EXPERIAN
          - ASNEF
          - OTHER
        callDate:
          type: string
          format: date-time
        referenceCode:
          maxLength: 100
          minLength: 1
          type: string
        isSuccess:
          type: boolean
        rawResponse:
          maxLength: 10000
          minLength: 0
          type: string
        note:
          maxLength: 1000
          minLength: 0
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
    FilterOptions:
      type: object
      properties:
        caseInsensitiveStrings:
          type: boolean
        includeInheritedFields:
          type: boolean
      description: Filter options for customizing filter behavior
    FilterRequestScoringModelDTO:
      required:
      - pagination
      type: object
      properties:
        filters:
          $ref: "#/components/schemas/ScoringModelDTO"
        rangeFilters:
          $ref: "#/components/schemas/RangeFilter"
